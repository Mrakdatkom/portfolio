<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal portfolio — front-end developer & creative coder.">
  <title>Mark Ryan — Portfolio</title>

  <!-- Pixel font: Pixelify Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=EB+Garamond:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>

  <!-- Compiled stylesheet (Tailwind v4 + all custom classes) -->
  <link rel="stylesheet" href="styles/output.css">

  <link rel="shortcut icon" href="images/laptop.svg" type="image/x-icon">
</head>

<body>

  <!-- Background texture layers (decorative, aria-hidden) -->
  <div class="bg-dot-grid" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- ─── Section mount points ────────────────────────────────── -->
  <!-- Sections are loaded and injected here by main.js            -->

  <div id="smooth-wrapper">
    <div id="smooth-content">
      <div id="section-hero" data-speed="1"></div>
      <div id="section-skills" data-speed="1"></div>
      <div id="section-about" data-speed="1"></div>
      <div id="section-work" data-speed="1"></div>
      <div id="section-education" data-speed="1"></div>
      <div id="section-certifications" data-speed="1"></div>
      <div id="section-prof-dev" data-speed="1"></div>
      <div id="section-contact" data-speed="1"></div>

      <!-- Future sections — add mount points as you build them -->
      <!-- <div id="section-projects"></div> -->
      <!-- <div id="section-contact"></div>  -->
    </div>
  </div>

  <!-- App entry — type="module" enables ES module imports -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
