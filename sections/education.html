<hr class="w-24 h-1 bg-charcoal/40 border-0 rounded mx-auto">
<section class="w-full px-6 py-16 md:py-24 bg-parchment/30" id="education">
  <div class="max-w-3xl mx-auto">

    <!-- Section header -->
    <div class="text-center mb-12 md:mb-16">
      <h2 class="font-['PT_Sans'] text-3xl md:text-4xl text-charcoal inline-block border-b-2 border-terracotta pb-2">
        Education
      </h2>
    </div>

    <!-- Corner frame wrapper -->
    <div class="relative p-px" id="edu-frame">
      <!-- Corner accents -->
      <div class="absolute -top-0.5 -left-0.5 w-3 h-3 border-t-2 border-l-2 border-terracotta/45"></div>
      <div class="absolute -top-0.5 -right-0.5 w-3 h-3 border-t-2 border-r-2 border-terracotta/45"></div>
      <div class="absolute -bottom-0.5 -left-0.5 w-3 h-3 border-b-2 border-l-2 border-terracotta/45"></div>
      <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 border-b-2 border-r-2 border-terracotta/45"></div>

      <!-- Terminal window -->
      <div class="border border-parchment-deep rounded-md overflow-hidden" id="edu-card">

        <!-- Title bar -->
        <div class="flex items-center bg-parchment-deep border-b border-terracotta/20">
          <div class="flex items-center gap-[5px] px-3 py-[10px] border-r border-terracotta/15">
            <span class="w-[10px] h-[10px] bg-terracotta rotate-45 opacity-85 block"></span>
            <span class="w-[10px] h-[10px] bg-terracotta rotate-45 opacity-50 block"></span>
            <span class="w-[10px] h-[10px] bg-terracotta rotate-45 opacity-25 block"></span>
          </div>
          <span class="font-['DM_Mono'] text-xs font-medium text-charcoal/70 px-4 tracking-wide">
            ~/education/degree.json
          </span>
        </div>

        <!-- Body -->
        <div class="bg-parchment-dark px-6 py-5">

          <!-- Prompt -->
          <div class="flex items-center gap-2 mb-4 pb-3 border-b border-dashed border-terracotta/20">
            <span class="font-['DM_Mono'] text-xs text-terracotta/70 font-medium">~/education $</span>
            <span class="font-['DM_Mono'] text-[13px] text-charcoal/80">cat degree.json</span>
            <span class="inline-block w-[7px] h-[13px] bg-terracotta/60 animate-pulse"></span>
          </div>

          <!-- JSON output -->
          <div class="font-['DM_Mono'] text-[13px] leading-[1.8] flex flex-col gap-0.5" id="edu-json">
            <div><span class="text-charcoal/50">{</span></div>

            <div class="pl-5" id="edu-line-1">
              <span class="text-charcoal-light">"degree"</span><span class="text-charcoal-light/50">: </span><span
                class="text-terracotta">"Bachelor of Science in Information Systems"</span><span
                class="text-charcoal/50">,</span>
            </div>

            <div class="pl-5" id="edu-line-2">
              <span class="text-charcoal-light">"institution"</span><span class="text-charcoal-light/50">: </span><span
                class="text-terracotta">"Colegio de Sta. Ana de Victorias Inc."</span><span
                class="text-charcoal/50">,</span>
            </div>

            <div class="pl-5" id="edu-line-3">
              <span class="text-charcoal-light">"period"</span><span class="text-charcoal-light/50">: </span><span
                class="text-terracotta/60 font-light">"August 2022 – June 2026"</span><span
                class="text-charcoal/50">,</span>
            </div>

            <div class="pl-5" id="edu-line-4">
              <span class="text-charcoal-light">"status"</span><span class="text-charcoal-light/50">: </span><span
                class="text-terracotta font-medium">true</span>
              <span class="text-charcoal-light/40 text-[11px] italic ml-2">// graduating</span><span
                class="text-charcoal/50">,</span>
            </div>

            <div class="pl-5" id="edu-line-5">
              <span class="text-charcoal-light">"progress"</span><span class="text-charcoal-light/50">: </span><span
                class="text-charcoal/75 font-medium">0.95</span>
            </div>

            <!-- Progress bar -->
            <div class="pl-5 flex items-center gap-3 mt-1 mb-1" id="edu-bar-row">
              <div class="h-[6px] w-48 bg-terracotta/12 rounded-sm overflow-hidden">
                <div class="h-full bg-gradient-to-r from-terracotta to-terracotta/50 rounded-sm" id="edu-bar"
                  style="width: 0%"></div>
              </div>
              <span class="text-[11px] text-terracotta/65 italic">95% — Final Year</span>
            </div>

            <div><span class="text-charcoal/50">}</span></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Pixel separator -->
    <div class="flex justify-center items-center gap-2 mt-16">
      <span class="inline-block w-2 h-2 bg-terracotta/20 rotate-45 scale-75"></span>
      <span class="inline-block w-2 h-2 bg-terracotta/50 rotate-45 scale-90"></span>
      <span class="inline-block w-2 h-2 bg-terracotta rotate-45"></span>
      <span class="inline-block w-2 h-2 bg-terracotta/50 rotate-45 scale-90"></span>
      <span class="inline-block w-2 h-2 bg-terracotta/20 rotate-45 scale-75"></span>
    </div>

  </div>
</section>
