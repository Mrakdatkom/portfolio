<section id="education" class="w-full px-6 py-16 md:py-24 bg-background">
  <div class="max-w-3xl mx-auto">

    <!-- Section header -->
    <div class="text-center mb-12 md:mb-16">
      <h2
        class="font-serif text-3xl md:text-4xl font-semibold text-foreground tracking-tight inline-block border-b-2 border-primary pb-2">
        Education
      </h2>
    </div>

    <!-- Card wrapper (keep id="edu-card" for GSAP) -->
    <div id="edu-card" class="rounded-lg overflow-hidden border border-border shadow-sm">

      <!-- Title bar with macOS circles -->
      <div class="flex items-center bg-surface border-b border-border">
        <div class="flex items-center gap-1.5 px-3 py-2 border-r border-border">
          <span class="w-[10px] h-[10px] rounded-full bg-[#FF5F57] block"></span>
          <span class="w-[10px] h-[10px] rounded-full bg-[#FFBD2E] block"></span>
          <span class="w-[10px] h-[10px] rounded-full bg-[#28C840] block"></span>
        </div>
        <span class="font-mono text-xs font-medium text-muted px-4 tracking-wide">
          ~/education/degree.json
        </span>
      </div>

      <!-- Body -->
      <div class="bg-surface px-6 py-5">

        <!-- Prompt -->
        <div class="flex items-center gap-2 mb-4 pb-3 border-b border-dashed border-border">
          <span class="font-mono text-xs text-primary/70">~/education $</span>
          <span class="font-mono text-sm text-foreground/80">cat degree.json</span>
          <span class="inline-block w-1.5 h-3 bg-primary animate-pulse"></span>
        </div>

        <!-- JSON output (all IDs preserved) -->
        <div class="font-mono text-sm leading-relaxed flex flex-col gap-0.5" id="edu-json">
          <div><span class="text-muted/50">{</span></div>

          <div class="pl-5" id="edu-line-1">
            <span class="text-foreground/80">"degree"</span><span class="text-muted/40">: </span><span
              class="text-primary">"Bachelor of Science in Information Systems"</span><span
              class="text-muted/40">,</span>
          </div>

          <div class="pl-5" id="edu-line-2">
            <span class="text-foreground/80">"institution"</span><span class="text-muted/40">: </span><span
              class="text-primary">"Colegio de Sta. Ana de Victorias Inc."</span><span class="text-muted/40">,</span>
          </div>

          <div class="pl-5" id="edu-line-3">
            <span class="text-foreground/80">"period"</span><span class="text-muted/40">: </span><span
              class="text-primary/70">"August 2022 – June 2026"</span><span class="text-muted/40">,</span>
          </div>

          <div class="pl-5" id="edu-line-4">
            <span class="text-foreground/80">"status"</span><span class="text-muted/40">: </span><span
              class="text-primary font-medium">"completed"</span>
            <span class="text-muted/40 text-[11px] italic ml-2">// graduated</span><span class="text-muted/40">,</span>
          </div>

          <div class="pl-5" id="edu-line-5">
            <span class="text-foreground/80">"progress"</span><span class="text-muted/40">: </span><span
              class="text-foreground/70 font-medium">1.0</span>
          </div>

          <!-- Progress bar row -->
          <div class="pl-5 flex items-center gap-3 mt-2 mb-1" id="edu-bar-row">
            <div class="h-1.5 w-48 bg-primary/10 rounded-full overflow-hidden">
              <!-- Changed width from 0% to 100% to reflect your completion -->
              <div class="h-full bg-gradient-to-r from-primary to-primary/60 rounded-full" id="edu-bar"
                style="width: 100%"></div>
            </div>
            <span class="text-[11px] text-primary/70 italic">100% — Degree Holder</span>
          </div>

          <div><span class="text-muted/50">}</span></div>
        </div>

      </div>
    </div>

    <!-- Bottom separator -->
    <div class="flex justify-center items-center gap-2 mt-16">
      <span class="inline-block w-4 h-px bg-border"></span>
      <span class="inline-block w-1.5 h-1.5 bg-primary rotate-45"></span>
      <span class="inline-block w-4 h-px bg-border"></span>
    </div>

  </div>
</section>
