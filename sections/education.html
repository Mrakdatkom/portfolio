<hr class="w-24 h-1 bg-charcoal/40 border-0 rounded mx-auto">
<section class="w-full px-6 py-16 md:py-24 bg-parchment/30" id="education">
  <div class="max-w-4xl mx-auto">

    <!-- Section header -->
    <div class="text-center mb-12 md:mb-16">
      <h2
        class="font-['Pixelify_Sans'] text-3xl md:text-4xl text-charcoal inline-block border-b-2 border-terracotta pb-2">
        Education
      </h2>
    </div>

    <!-- Education card (similar style to work but more compact) -->
    <div class="relative">
      <!-- Pixel corner decorations -->
      <div class="absolute -top-2 -left-2 w-4 h-4 border-t-2 border-l-2 border-terracotta/50"></div>
      <div class="absolute -top-2 -right-2 w-4 h-4 border-t-2 border-r-2 border-terracotta/50"></div>
      <div class="absolute -bottom-2 -left-2 w-4 h-4 border-b-2 border-l-2 border-terracotta/50"></div>
      <div class="absolute -bottom-2 -right-2 w-4 h-4 border-b-2 border-r-2 border-terracotta/50"></div>

      <!-- Main card -->
      <div
        class="bg-parchment-dark/40 backdrop-blur-sm rounded-lg p-6 md:p-8 border border-parchment-deep shadow-lg hover:shadow-xl transition-all duration-300">

        <!-- Degree title (pixel style) -->
        <div class="mb-4">
          <h3 class="font-['Pixelify_Sans'] text-xl md:text-2xl text-terracotta">
            Bachelor of Science in Information Systems
          </h3>
        </div>

        <!-- University / Institution -->
        <div class="mb-3">
          <p class="font-['DM_Mono'] text-charcoal-light">
            <span class="font-bold text-charcoal">Colegio de Sta. Ana de Victorias Inc.</span>
          </p>
        </div>

        <!-- Date range with pixel bullet -->
        <div class="flex items-center gap-2 mt-4 pt-2 border-t border-parchment-deep/50">
          <span class="inline-block w-2 h-2 bg-terracotta rotate-45"></span>
          <span class="font-['DM_Mono'] text-sm text-charcoal-light/80 tracking-wide">
            August 2022 – June 2026
          </span>
        </div>

        <!-- Optional: mini pixel bar (progress indicator) -->
        <div class="mt-6 flex items-center gap-2">
          <div class="h-1 flex-1 bg-parchment-deep/30 rounded-full overflow-hidden">
            <div class="w-full h-full bg-terracotta/60 rounded-full" style="width: 95%"></div>
          </div>
          <span class="text-xs font-['DM_Mono'] text-charcoal-light/60">Final Year</span>
        </div>
      </div>
    </div>

    <!-- Decorative pixel line separator -->
    <div class="flex justify-center gap-2 mt-16">
      <div class="w-2 h-2 bg-terracotta/40 rotate-45"></div>
      <div class="w-2 h-2 bg-terracotta/60 rotate-45"></div>
      <div class="w-2 h-2 bg-terracotta rotate-45"></div>
    </div>
  </div>
</section>
