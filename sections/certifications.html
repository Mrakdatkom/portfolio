<hr class="w-24 h-1 bg-charcoal/40 border-0 rounded mx-auto">
<section class="w-full px-6 py-16 md:py-24 bg-parchment/20" id="certifications">
  <div class="max-w-6xl mx-auto">

    <!-- Section header -->
    <div class="text-center mb-12 md:mb-16">
      <h2
        class="font-['Pixelify_Sans'] text-3xl md:text-4xl text-charcoal inline-block border-b-2 border-terracotta pb-2">
        Certifications
      </h2>
    </div>

    <!-- Centered two‑card grid using flex + responsive width -->
    <div class="flex flex-wrap justify-center gap-6 md:gap-8">

      <!-- Card 1 – Data Entry Certification -->
      <div
        class="cert-card w-full sm:w-80 bg-parchment-dark/40 backdrop-blur-sm rounded-lg border border-parchment-deep p-5 hover:shadow-xl transition-all duration-300 cursor-pointer group"
        data-cert-img="images/certs/data-entry.png" data-cert-title="Data Entry Certification"
        data-cert-issuer="Data Entry Course" data-cert-date="June 2024">

        <!-- Thumbnail area -->
        <div
          class="w-full h-36 bg-parchment-deep/30 rounded-md mb-4 overflow-hidden border border-parchment-deep flex items-center justify-center">
          <img src="images/certs/data-entry.png" alt="Data Entry cert thumbnail"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        </div>

        <h3 class="font-['Pixelify_Sans'] text-lg text-terracotta mb-1">Data Entry Certification</h3>
        <p class="font-['DM_Mono'] text-xs text-charcoal-light/80 mb-1">Data Entry Course</p>
        <p class="font-['DM_Mono'] text-xs text-charcoal-light/60">June 2024</p>

        <div
          class="mt-4 inline-block text-xs font-['DM_Mono'] text-terracotta border border-terracotta/40 rounded px-3 py-1 hover:bg-terracotta hover:text-parchment transition-all">
          View credential →
        </div>
      </div>

      <!-- Card 2 – Publication Certification (or your second certificate) -->
      <div
        class="cert-card w-full sm:w-80 bg-parchment-dark/40 backdrop-blur-sm rounded-lg border border-parchment-deep p-5 hover:shadow-xl transition-all duration-300 cursor-pointer group"
        data-cert-img="images/certs/publish.jpg" data-cert-title="Publication Certification"
        data-cert-issuer="Research Study" data-cert-date="May 2026">

        <div
          class="w-full h-36 bg-parchment-deep/30 rounded-md mb-4 overflow-hidden border border-parchment-deep flex items-center justify-center">
          <img src="images/certs/publish.jpg" alt="Publication cert thumbnail"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
        </div>

        <h3 class="font-['Pixelify_Sans'] text-lg text-terracotta mb-1">Publication Certification</h3>
        <p class="font-['DM_Mono'] text-xs text-charcoal-light/80 mb-1">Research Study</p>
        <p class="font-['DM_Mono'] text-xs text-charcoal-light/60">May 2026</p>

        <div
          class="mt-4 inline-block text-xs font-['DM_Mono'] text-terracotta border border-terracotta/40 rounded px-3 py-1 hover:bg-terracotta hover:text-parchment transition-all">
          View credential →
        </div>
      </div>
    </div>

    <!-- Pixel separator -->
    <div class="flex justify-center gap-2 mt-16">
      <div class="w-2 h-2 bg-terracotta/40 rotate-45"></div>
      <div class="w-2 h-2 bg-terracotta/60 rotate-45"></div>
      <div class="w-2 h-2 bg-terracotta rotate-45"></div>
    </div>
  </div>

  <!-- Modal (unchanged) -->
  <div id="cert-modal" class="fixed inset-0 z-50 flex items-center justify-center px-4 pointer-events-none opacity-0">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" id="modal-overlay"></div>
    <div
      class="relative bg-parchment rounded-lg max-w-3xl w-full max-h-[90vh] overflow-auto shadow-2xl border-4 border-terracotta">
      <button id="modal-close"
        class="absolute top-2 right-2 w-8 h-8 bg-terracotta text-parchment rounded-md font-bold hover:bg-terracotta-light transition-colors z-10">
        ✕
      </button>
      <div class="p-6 md:p-8">
        <img id="modal-img" src="" alt="Certificate full view"
          class="w-full h-auto border border-parchment-deep rounded shadow-md">
        <div class="mt-4 text-center">
          <h3 id="modal-title" class="font-['Pixelify_Sans'] text-2xl text-terracotta"></h3>
          <p id="modal-issuer" class="font-['DM_Mono'] text-sm text-charcoal-light"></p>
          <p id="modal-date" class="font-['DM_Mono'] text-xs text-charcoal-light/70 mt-1"></p>
        </div>
      </div>
    </div>
  </div>
</section>
